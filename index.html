<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Circuitos</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      padding: 30px 20px;
    }

    .contenedor-principal {
      max-width: 1100px;
      margin: 0 auto;
      background-color: #111;
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 30px;
      box-shadow: 0 0 30px rgba(255,255,255,0.05);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
    }

    .secciones {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 25px;
    }

    .bloque {
      background-color: #151515;
      border: 1px solid #2f2f2f;
      border-radius: 16px;
      padding: 20px;
    }

    h2 {
      margin-bottom: 15px;
      font-size: 20px;
      border-bottom: 1px solid #2f2f2f;
      padding-bottom: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #2f2f2f;
      text-align: center;
      padding: 8px;
    }

    th {
      background: #fff;
      color: #000;
    }

    td {
      background: #101010;
    }

    /* 🔥 INPUT PEQUEÑO Y ELEGANTE */
    .entrada-f {
      width: 35px;
      height: 35px;
      border-radius: 8px;
      border: 1px solid #666;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
      background: #fff;
      color: #000;
    }

    input[type="text"]:focus {
      outline: none;
      box-shadow: 0 0 5px #fff;
    }

    .panel-derecho {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .interruptores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .interruptor-item {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #0d0d0d;
      border-radius: 10px;
      border: 1px solid #2f2f2f;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: white;
    }

    /* 🔥 BOTONES PRO */
    .acciones {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    #btn-listo {
      background: #ffffff;
      color: #000;
    }

    #btn-listo:hover {
      background: #dcdcdc;
    }

    #btn-reset {
      background: #222;
      color: #fff;
      border: 1px solid #444;
    }

    #btn-reset:hover {
      background: #333;
    }

    #mensaje-validacion {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
    }

    .salida-led {
      text-align: center;
    }

    #led {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: bold;
    }

    @keyframes brillo {
      0% { box-shadow: 0 0 5px #fff; }
      50% { box-shadow: 0 0 20px #fff; }
      100% { box-shadow: 0 0 5px #fff; }
    }

    .led-on {
      background: #fff;
      color: #000;
      animation: brillo 1s infinite;
    }

    .led-off {
      background: #000;
      color: #fff;
    }

    @media (max-width: 900px) {
      .secciones {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>

<div class="contenedor-principal">
  <h1>Simulador de Circuitos</h1>

  <div class="secciones">

    <!-- TABLA -->
    <div class="bloque">
      <h2>Tabla de verdad</h2>
      <table>
        <thead>
          <tr>
            <th>d</th><th>c</th><th>b</th><th>a</th><th>f</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>0</td><td>0</td><td>0</td><td>0</td><td><input class="entrada-f"></td></tr>
          <tr><td>0</td><td>0</td><td>0</td><td>1</td><td><input class="entrada-f"></td></tr>
          <tr><td>0</td><td>0</td><td>1</td><td>0</td><td><input class="entrada-f"></td></tr>
          <tr><td>0</td><td>0</td><td>1</td><td>1</td><td><input class="entrada-f"></td></tr>
          <tr><td>0</td><td>1</td><td>0</td><td>0</td><td><input class="entrada-f"></td></tr>
          <tr><td>0</td><td>1</td><td>0</td><td>1</td><td><input class="entrada-f"></td></tr>
          <tr><td>0</td><td>1</td><td>1</td><td>0</td><td><input class="entrada-f"></td></tr>
          <tr><td>0</td><td>1</td><td>1</td><td>1</td><td><input class="entrada-f"></td></tr>
          <tr><td>1</td><td>0</td><td>0</td><td>0</td><td><input class="entrada-f"></td></tr>
          <tr><td>1</td><td>0</td><td>0</td><td>1</td><td><input class="entrada-f"></td></tr>
          <tr><td>1</td><td>0</td><td>1</td><td>0</td><td><input class="entrada-f"></td></tr>
          <tr><td>1</td><td>0</td><td>1</td><td>1</td><td><input class="entrada-f"></td></tr>
          <tr><td>1</td><td>1</td><td>0</td><td>0</td><td><input class="entrada-f"></td></tr>
          <tr><td>1</td><td>1</td><td>0</td><td>1</td><td><input class="entrada-f"></td></tr>
          <tr><td>1</td><td>1</td><td>1</td><td>0</td><td><input class="entrada-f"></td></tr>
          <tr><td>1</td><td>1</td><td>1</td><td>1</td><td><input class="entrada-f"></td></tr>
        </tbody>
      </table>

      <div class="acciones">
        <button id="btn-listo">Listo</button>
        <button id="btn-reset">Reset</button>
      </div>

      <p id="mensaje-validacion"></p>
    </div>

    <!-- PANEL DERECHO -->
    <div class="panel-derecho">

      <div class="bloque">
        <h2>Interruptores</h2>
        <div class="interruptores">
          <div class="interruptor-item">d <input type="checkbox" id="switch-d"></div>
          <div class="interruptor-item">c <input type="checkbox" id="switch-c"></div>
          <div class="interruptor-item">b <input type="checkbox" id="switch-b"></div>
          <div class="interruptor-item">a <input type="checkbox" id="switch-a"></div>
        </div>
      </div>

      <div class="bloque salida-led">
        <h2>Salida</h2>
        <span id="led">0</span>
      </div>

    </div>

  </div>
</div>

<script src="circuito.js"></script>

</body>
</html>
